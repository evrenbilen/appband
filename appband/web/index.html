<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AppBand</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- Self-hosted Chart.js so the dashboard makes zero external requests (works
       offline / behind captive portals) and satisfies the strict script-src 'self'
       CSP. Pinned: chart.js@4.4.0 umd min, sha256
       0e2326c6868072bec1592760c6729043caeea2960a2b46cee6a2192aac6abff0 -->
  <script src="/static/vendor/chart.umd.min.js" defer></script>
  <script type="module" src="/static/app.js"></script>
</head>
<body>

  <!-- ── Sticky filter bar ─────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="brand-dot"></div>
      <h1>AppBand</h1>
    </div>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label" data-i18n="filters.range.label">Range</span>
        <select id="range">
          <option value="3600" data-i18n="filters.range.last_hour">Last hour</option>
          <option value="86400" selected data-i18n="filters.range.today">Today</option>
          <option value="604800" data-i18n="filters.range.last_7d">Last 7 days</option>
          <option value="2592000" data-i18n="filters.range.last_30d">Last 30 days</option>
        </select>
      </div>

      <div class="filter-group">
        <span class="filter-label" data-i18n="filters.network.label">Network</span>
        <select id="ssid">
          <option value="" data-i18n="filters.network.all">All</option>
        </select>
      </div>

      <div class="filter-group">
        <span class="filter-label" data-i18n="filters.scope.label">Traffic</span>
        <select id="scope">
          <option value="internet" selected data-i18n="filters.scope.internet">Internet</option>
          <option value="lan" data-i18n="filters.scope.lan">LAN</option>
          <option value="all" data-i18n="filters.scope.all">All</option>
        </select>
      </div>

      <button id="btn-refresh">
        <span class="refresh-icon">↻</span>
        <span data-i18n="filters.refresh">Refresh</span>
      </button>

      <div class="lang-toggle" role="group" aria-label="Language">
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="tr" class="lang-btn">TR</button>
      </div>
    </div>
  </header>

  <!-- ── Main content ───────────────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Now ----------------------------------------------------------------- -->
    <section class="card card-live" id="panel-current">
      <div class="card-header">
        <div class="live-label">
          <span class="pulse-dot"></span>
          <span data-i18n="panel.current.live">Live</span>
        </div>
        <div id="live-network-badge"></div>
      </div>
      <div id="current-body">
        <!-- skeleton -->
        <div class="skeleton-stats">
          <div class="skeleton-stat">
            <div class="skeleton-line" style="width:40px; height:11px;"></div>
            <div class="skeleton-line" style="width:110px; height:30px;"></div>
          </div>
          <div class="skeleton-stat">
            <div class="skeleton-line" style="width:40px; height:11px;"></div>
            <div class="skeleton-line" style="width:110px; height:30px;"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Time Series ---------------------------------------------------------- -->
    <section class="card" id="panel-timeseries">
      <div class="card-header">
        <span class="card-title" data-i18n="panel.timeseries.title">Time Series</span>
        <div class="legend-chips">
          <div class="legend-chip">
            <span class="legend-dot" style="background:var(--download-color);"></span><span data-i18n="legend.download">Download</span>
          </div>
          <div class="legend-chip">
            <span class="legend-dot" style="background:var(--upload-color);"></span><span data-i18n="legend.upload">Upload</span>
          </div>
        </div>
      </div>
      <div id="timeseries-body">
        <div class="skeleton-block" style="height:180px;"></div>
      </div>
    </section>

    <!-- By Domain + By App (two-column) -------------------------------------- -->
    <div class="card-row">

      <section class="card" id="panel-domain">
        <div class="card-header">
          <span class="card-title" data-i18n="panel.by_domain.title">By Domain</span>
          <span class="approx-badge" data-i18n="panel.by_domain.note" data-i18n-title="panel.approx_help" title="">approximate</span>
          <span class="scope-badge" id="scope-badge-domain">Internet</span>
        </div>
        <div id="domain-body">
          <div class="skeleton-block" style="height:220px;"></div>
        </div>
      </section>

      <section class="card" id="panel-process">
        <div class="card-header">
          <span class="card-title" data-i18n="panel.by_process.title">By App</span>
          <span class="approx-badge" id="approx-badge-process" data-i18n="panel.by_domain.note" data-i18n-title="panel.approx_help" title="" hidden>approximate</span>
          <span class="scope-badge" id="scope-badge-process">Internet</span>
        </div>
        <div id="process-body">
          <div class="skeleton-block" style="height:200px;"></div>
        </div>
      </section>

    </div>

    <!-- By Network ----------------------------------------------------------- -->
    <section class="card" id="panel-network">
      <div class="card-header">
        <span class="card-title" data-i18n="panel.by_network.title">By Network</span>
      </div>
      <div id="network-body">
        <div class="skeleton-block" style="height:140px;"></div>
      </div>
    </section>

  </main>
</body>
</html>
